<h1 id="_1">まゐらす（まいらす）</h1>
<p><strong>品詞</strong>: 動詞・サ行四段
<strong>カテゴリ</strong>: 敬語動詞</p>
<h2 id="_2">意味</h2>
<ol>
<li>差し上げる（謙譲）
   - 例：「おのれも、この仏をば拝みまゐらせたりや（宇治拾遺物語『猟師、仏を射ること』）」</li>
<li>用例
   - 例：「おろかならぬ御ことに思ひまゐらせ候へども（平家物語『忠度の都落ち』）」</li>
<li>用例
   - 例：「加持まゐらせさせたまふ（源氏物語（二）『髪の香』）」</li>
<li>用例
   - 例：「』と尋ねまゐらせたまへりけるに、紫式部を召して、『何をか参らすべき（無名草子『紫式部』）」</li>
<li>用例
   - 例：「まゐらせたまへる（大鏡（二）『肝試し』）」</li>
</ol>
