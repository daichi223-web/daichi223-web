<h1 id="_1">まいる → まゐる（参る）</h1>
<div class="callout callout-warning"><div class="callout-title">表記揺れ</div><div class="callout-body"><p>「まいる」は「まゐる（参る）」の現代仮名遣い表記。

<h2 id="_2">基本情報（概要）</h2>
<ul>
<li><strong>歴史的仮名遣い</strong>: まゐる</li>
<li><strong>現代仮名遣い</strong>: まいる</li>
<li><strong>品詞</strong>: 動詞・ラ行四段</li>
<li><strong>意味</strong>:</li>
<li>❶ 参上する（謙譲語）</li>
<li>❷ 差し上げる（謙譲語）</li>
<li>❸ 召し上がる（尊敬語）</li>
<li>❹ お乗りになる（尊敬語）</li>
</ul>
<p>→ <strong>完全な解説は まゐる を参照。</strong></p>
