<h1 id="_1">おもてなし → おもて / もてなし</h1>
<div class="callout callout-info"><div class="callout-title">注意：2つの語の複合</div><div class="callout-body"><p><strong>「おもてなし」は古文では2通りの解釈がある。</strong></p></div></div>

<hr />
<h2 id="1">解釈1: おもて（面）＋ なし</h2>
<p>「面目がない」＝ 恥ずかしい・面目を失う。</p>
<p>→ 詳細は <strong>おもて</strong> を参照。
→ 「おもてぶせ」と同系の表現。</p>
<h2 id="2">解釈2: もてなし（持て成し）の丁寧形</h2>
<p>「もてなし」＝ ❶ふるまい・態度（★古文特有）❷接待。</p>
<p>→ 詳細は <strong>もてなし</strong> を参照。</p>
<hr />
<div class="callout callout-warning"><div class="callout-title">注意</div><div class="callout-body"><p><strong>現代語「おもてなし」＝ 接待・歓待（2013年東京五輪招致で有名に）。</strong>
<strong>古文では「おもて＋なし」（面目がない）の可能性を常に考えること。</strong>
<strong>文脈判断が必要。</strong></p></div></div>
